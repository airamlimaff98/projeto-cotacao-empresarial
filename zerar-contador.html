<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerar Contador de Cotação</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #29287A;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #1e3a5f;
            margin-bottom: 20px;
        }
        button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px;
        }
        button:hover {
            background-color: #c82333;
        }
        .btn-voltar {
            background-color: #6c757d;
        }
        .btn-voltar:hover {
            background-color: #5a6268;
        }
        #mensagem {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .sucesso {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .erro {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="container">
        <h1>⚠️ Zerar Contador de Cotação</h1>
        <p>Esta ação irá zerar o número da cotação para 0.</p>
        <p><strong>ATENÇÃO:</strong> Esta operação não pode ser desfeita!</p>
        
        <button onclick="zerarContador()">Zerar Contador</button>
        <button class="btn-voltar" onclick="window.location.href='index.html'">Voltar</button>
        
        <div id="mensagem"></div>
    </div>

    <script>
        async function zerarContador() {
            if (!confirm('Tem certeza que deseja zerar o contador de cotação?\n\nEsta ação não pode ser desfeita!')) {
                return;
            }

            try {
                const contadorRef = database.ref('configuracoes/ultimoNumero');
                await contadorRef.set(0);
                
                mostrarMensagem('Contador zerado com sucesso! O próximo número será 1.', 'sucesso');
            } catch (error) {
                console.error('Erro ao zerar contador:', error);
                mostrarMensagem('Erro ao zerar contador: ' + error.message, 'erro');
            }
        }

        function mostrarMensagem(texto, tipo) {
            const mensagem = document.getElementById('mensagem');
            mensagem.textContent = texto;
            mensagem.className = tipo;
            mensagem.style.display = 'block';
        }
    </script>
</body>
</html>
